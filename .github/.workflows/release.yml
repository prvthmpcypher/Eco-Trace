name: Release — APK & EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # 1. Build the Vite SPA (shared by all targets)
  # ─────────────────────────────────────────────
  build-web:
    name: Build Vite SPA
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Vite production build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ─────────────────────────────────────────────
  # 2. Android APK via Capacitor
  # ─────────────────────────────────────────────
  build-apk:
    name: Build Android APK
    needs: build-web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java 17 (required by Android Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init EcoTrace com.ecotrace.app --web-dir=dist 2>/dev/null || true
          npx cap add android 2>/dev/null || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          VERSION="${{ github.ref_name }}"
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             EcoTrace-${VERSION}-android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: EcoTrace-*.apk

  # ─────────────────────────────────────────────
  # 3. Windows EXE via Electron Builder
  # ─────────────────────────────────────────────
  build-exe:
    name: Build Windows EXE
    needs: build-web
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install Electron Builder
        run: npm install --save-dev electron electron-builder

      - name: Create Electron main entry
        shell: bash
        run: |
          cat > electron-main.js << 'EOF'
          const { app, BrowserWindow } = require('electron');
          const path = require('path');

          function createWindow() {
            const win = new BrowserWindow({
              width: 420,
              height: 900,
              title: 'EcoTrace',
              webPreferences: { nodeIntegration: false, contextIsolation: true },
              icon: path.join(__dirname, 'dist/favicon.ico'),
            });
            win.loadFile(path.join(__dirname, 'dist/index.html'));
          }

          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
          EOF

      - name: Patch package.json for Electron
        shell: bash
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.main = 'electron-main.js';
            pkg.build = {
              appId: 'com.ecotrace.app',
              productName: 'EcoTrace',
              directories: { output: 'release' },
              files: ['dist/**/*', 'electron-main.js'],
              win: { target: 'nsis', icon: 'dist/favicon.ico' },
              nsis: { oneClick: false, allowToChangeInstallationDirectory: true }
            };
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Build Windows installer
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename EXE
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          mv release/*.exe EcoTrace-${VERSION}-windows-setup.exe 2>/dev/null || true
          mv release/*.exe EcoTrace-${VERSION}-windows-setup.exe 2>/dev/null || true

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: EcoTrace-*.exe

  # ─────────────────────────────────────────────
  # 4. Create GitHub Release and attach all files
  # ─────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [build-apk, build-exe]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets/

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "EcoTrace ${{ github.ref_name }}"
          body: |
            ## 🌿 EcoTrace ${{ github.ref_name }}

            **Carbon Footprint Tracker & AI EcoCoach**

            ### Downloads
            | Platform | File | Notes |
            |---|---|---|
            | 🤖 Android | `EcoTrace-*-android.apk` | Debug build — enable "Install Unknown Apps" |
            | 🖥 Windows | `EcoTrace-*-windows-setup.exe` | NSIS installer |
            | 🌐 Web | [GitHub Pages](https://prvthmpcypher.github.io/eco-trace) | No install needed |

            ### What's in this release
            See [CHANGELOG.md](CHANGELOG.md) for details.
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
