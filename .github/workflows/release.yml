name: Release — APK & EXE

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # 1. Build Vite SPA
  # ─────────────────────────────────────────────
  build-web:
    name: Build Vite SPA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Vite production build
        run: npm run build
        env:
          NODE_ENV: production
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ─────────────────────────────────────────────
  # 2. Android APK via Capacitor
  # ─────────────────────────────────────────────
  build-apk:
    name: Build Android APK
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Write capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.ecotrace.app",
            "appName": "EcoTrace",
            "webDir": "dist",
            "server": { "androidScheme": "https" }
          }
          EOF

      - name: Install & init Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  # ─────────────────────────────────────────────
  # 3. Windows EXE via Electron Builder
  # ─────────────────────────────────────────────
  build-exe:
    name: Build Windows EXE
    needs: build-web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install Electron + Builder
        run: npm install --save-dev electron electron-builder

      - name: Write electron-main.js
        shell: bash
        run: |
          cat > electron-main.js << 'EOF'
          const { app, BrowserWindow } = require('electron');
          const path = require('path');
          function createWindow() {
            const win = new BrowserWindow({
              width: 420,
              height: 900,
              title: 'EcoTrace',
              webPreferences: { nodeIntegration: false, contextIsolation: true },
            });
            win.loadFile(path.join(__dirname, 'dist/index.html'));
          }
          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
          EOF

      - name: Patch package.json for Electron
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json','utf8'));
            pkg.main = 'electron-main.js';
            pkg.build = {
              appId: 'com.ecotrace.app',
              productName: 'EcoTrace',
              directories: { output: 'release' },
              files: ['dist/**/*', 'electron-main.js'],
              win: { target: 'nsis' },
              nsis: { oneClick: false, allowToChangeInstallationDirectory: true }
            };
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Build Windows installer
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/*.exe

  # ─────────────────────────────────────────────
  # 4. Attach to GitHub Release
  # ─────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [build-apk, build-exe]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets/

      - uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release-assets/

      - name: Rename files
        run: |
          VERSION="${{ github.ref_name }}"
          mv release-assets/app-debug.apk release-assets/EcoTrace-${VERSION}-android.apk || true
          for f in release-assets/*.exe; do
            mv "$f" "release-assets/EcoTrace-${VERSION}-windows-setup.exe" || true
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "EcoTrace ${{ github.ref_name }}"
          body: |
            ## 🌿 EcoTrace ${{ github.ref_name }}

            **Carbon Footprint Tracker & AI EcoCoach**

            | Platform | File | Notes |
            |---|---|---|
            | 🤖 Android | `EcoTrace-*-android.apk` | Enable "Install from Unknown Sources" |
            | 🖥 Windows | `EcoTrace-*-windows-setup.exe` | NSIS installer |
            | 🌐 Web | [Live Demo](https://prvthmpcypher.github.io/Eco-Trace) | No install needed |
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
